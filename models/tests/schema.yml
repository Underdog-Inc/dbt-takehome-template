version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]

  - name: fct_monthly_revenue
    tests:
      - relationships:
          to: ref('stg_orders')
          field: customer_id
          column: customer_id